name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

    - name: Build frontend
      run: cd frontend && npm ci && npm run build:prod

    - name: Build backend binary for release artifact
      run: CGO_ENABLED=1 go build -ldflags "-w -s -X main.VERSION=${GITHUB_REF#refs/tags/}" -o joylivedashboard .

    - name: Package release artifacts
      run: tar -czf frontend-dist.tar.gz -C frontend dist

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          VERSION=${{ steps.version.outputs.VERSION }}
          RELEASE_TAG=${{ steps.version.outputs.VERSION }}
        tags: |
          ${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          ${{ github.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          joylivedashboard
          frontend-dist.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
